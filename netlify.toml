[build]
  command   = "npm install"
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  included_files = ["data/**", "views/**", "middleware/**"]

# All non-static routes → Express function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
